name: Actualizar eventos Santiago
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Raspar y actualizar eventos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-events.js
        continue-on-error: true
      
      - name: Agregar imágenes
        run: node scripts/add-placeholder-images.js
        continue-on-error: true
      
      - name: Agregar restaurantes
        run: |
          if [ -f scripts/add-restaurants.js ]; then
            node scripts/add-restaurants.js
          fi
        continue-on-error: true
      
      - name: Commit y push
        run: |
          git config user.name "Gaut Bot"
          git config user.email "bot@gaut.cl"
          git add events.json
          git diff --staged --quiet || git commit -m "🤖 Eventos actualizados $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true
