name: Actualizar eventos Santiago
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Raspar eventos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-events.js || true

      - name: Scraper Ticketplus (JSON-LD, sin Claude)
        run: node scripts/scrape-ticketplus.js || true

      - name: Scraper Centro Cultural La Moneda (CCLM)
        run: node scripts/scrape-cclm.js || true

      - name: Agregar imágenes placeholder
        run: node scripts/add-placeholder-images.js || true
      
      - name: Scraping de imágenes reales
        run: node scripts/scrape-images.js || true
      
      - name: Agregar restaurantes
        run: node add-restaurants.js || true
      
      - name: Push cambios
        run: |
          git config user.name "Gaut Bot"
          git config user.email "bot@gaut.cl"
          git add events.json || true
          git diff --staged --quiet || git commit -m "🤖 Eventos $(date +'%Y-%m-%d')" || true
          git push || true
