name: Actualizar eventos Santiago
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-events:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Raspar municipalidades y actualizar events.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-events.js
      
      # ← AGREGAR ESTOS 2 PASOS:
      - name: Agregar imágenes a eventos
        run: node scripts/add-placeholder-images.js
        continue-on-error: true
      
      - name: Agregar restaurantes niños
        run: node scripts/add-restaurants.js
        continue-on-error: true
      # ← FIN DE LOS NUEVOS PASOS
      
      - name: Commit y push si hay cambios
        run: |
          git config user.name  "Gaut Bot"
          git config user.email "bot@gaut.cl"
          git add events.json
          git diff --staged --quiet || git commit -m "🤖 Eventos actualizados $(date +'%Y-%m-%d')"
          git push
