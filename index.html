<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaut — Descubre Santiago</title>
  <meta name="description" content="Eventos y panoramas de Santiago. Busca, filtra y comparte.">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #185FA5;
      --primary-light: #378ADD;
      --primary-dark: #0C447C;
      --accent-green: #1D9E75;
      --accent-orange: #D97706;
      --bg: #FAFBFC;
      --surface: #FFFFFF;
      --surface-secondary: #F3F4F6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
      --success: #10B981;
      --warning: #F59E0B;
      --destructive: #EF4444;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 32px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header con búsqueda ─────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 800;
    }

    .search-box {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface-secondary);
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s;
    }

    .search-box input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1);
    }

    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .filter-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--surface-secondary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .filter-btn:active {
      background: var(--border);
    }

    /* ── Barra de categorías (horizontal scroll) ────────────────────────────── */
    .category-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .category-bar::-webkit-scrollbar {
      display: none;
    }

    .category-pill {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .category-pill:active,
    .category-pill.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ── Main content grid ──────────────────────────────────────────────────── */
    .container {
      padding: 12px 12px 80px;
      max-width: 600px;
      margin: 0 auto;
    }

    .events-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* ── Event card (el corazón del diseño) ──────────────────────────────────── */
    .event-card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      height: 340px;
    }

    .event-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }

    .event-image {
      position: relative;
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--surface-secondary), var(--border));
      overflow: hidden;
    }

    .event-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .event-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
    }

    .event-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .event-badge.free {
      background: rgba(16, 185, 129, 0.9);
    }

    .event-badge.paid {
      background: rgba(249, 115, 22, 0.9);
    }

    .event-content {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .event-category {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .event-title {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .event-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .event-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .event-price {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .event-price.free {
      color: var(--success);
    }

    .event-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--surface-secondary);
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .action-btn:active {
      background: var(--primary-light);
      color: white;
    }

    /* ── Empty state ────────────────────────────────────────────────────────── */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    /* ── Filter panel (modal) ───────────────────────────────────────────────── */
    .filter-panel {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none;
      align-items: flex-end;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .filter-panel.open {
      display: flex;
    }

    .filter-content {
      background: var(--surface);
      width: 100%;
      max-width: 600px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .filter-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: var(--surface-secondary);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .filter-group {
      margin-bottom: 20px;
    }

    .filter-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .filter-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .filter-option {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-option:active,
    .filter-option.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .filter-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .filter-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-actions .apply-btn {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ── Toast notifications ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--text-primary);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 60;
      animation: slideIn 0.3s ease-out;
      max-width: 280px;
      left: 20px;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Responsive ─────────────────────────────────────────────────────────── */
    @media (min-width: 768px) {
      .events-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .event-card {
        height: 360px;
      }

      .container {
        padding: 16px;
      }

      .header {
        padding: 16px;
      }
    }

    @media (min-width: 1024px) {
      .events-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .container {
        max-width: 1200px;
      }
    }
  </style>
</head>
<body>

<!-- Header con búsqueda y filtros -->
<header class="header">
  <a href="/" class="logo">
    <div class="logo-mark">G</div>
    <span>Gaut</span>
  </a>
  <div class="search-box">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Busca evento..." oninput="handleSearch()">
  </div>
  <button class="filter-btn" onclick="toggleFilterPanel()">⚙️</button>
</header>

<!-- Barra de categorías -->
<div class="category-bar" id="categoryBar">
  <button class="category-pill active" onclick="selectCategory('all')">✨ Todos</button>
  <button class="category-pill" onclick="selectCategory('culture')">🎭 Cultura</button>
  <button class="category-pill" onclick="selectCategory('music')">🎵 Música</button>
  <button class="category-pill" onclick="selectCategory('sport')">🏃 Deporte</button>
  <button class="category-pill" onclick="selectCategory('food')">🍽️ Comida</button>
</div>

<!-- Contenedor principal -->
<div class="container">
  <div class="events-grid" id="eventsGrid">
    <!-- Eventos se cargarán aquí dinámicamente -->
  </div>
</div>

<!-- Panel de filtros -->
<div class="filter-panel" id="filterPanel">
  <div class="filter-content">
    <div class="filter-header">
      <h2>Filtros</h2>
      <button class="close-btn" onclick="toggleFilterPanel()">✕</button>
    </div>

    <div class="filter-group">
      <label>Precio</label>
      <div class="filter-options">
        <button class="filter-option" onclick="toggleFilter('free')">🆓 Gratis</button>
        <button class="filter-option" onclick="toggleFilter('paid')">💰 Con entrada</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Accesibilidad</label>
      <div class="filter-options">
        <button class="filter-option" onclick="toggleFilter('accessible')">♿ Accesible</button>
        <button class="filter-option" onclick="toggleFilter('petfriendly')">🐾 Pet friendly</button>
        <button class="filter-option" onclick="toggleFilter('kids')">👶 Para niños</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Comuna</label>
      <div class="filter-options">
        <button class="filter-option" onclick="toggleFilter('lc')">Las Condes</button>
        <button class="filter-option" onclick="toggleFilter('vit')">Vitacura</button>
        <button class="filter-option" onclick="toggleFilter('cen')">Centro</button>
        <button class="filter-option" onclick="toggleFilter('nun')">Ñuñoa</button>
        <button class="filter-option" onclick="toggleFilter('lare')">La Reina</button>
        <button class="filter-option" onclick="toggleFilter('prov')">Providencia</button>
      </div>
    </div>

    <div class="filter-actions">
      <button onclick="resetFilters()">Limpiar</button>
      <button class="apply-btn" onclick="toggleFilterPanel()">Aplicar</button>
    </div>
  </div>
</div>

<script>
  // Estado global
  let allEvents = [];
  let selectedCategory = 'all';
  let activeFilters = {
    free: false,
    paid: false,
    accessible: false,
    petfriendly: false,
    kids: false,
    zones: new Set()
  };
  let searchQuery = '';

  // Cargar eventos
  async function loadEvents() {
    try {
      const res = await fetch('./events.json');
      const data = await res.json();
      allEvents = data.events || [];
      renderEvents();
    } catch (err) {
      console.error('Error cargando eventos:', err);
      document.getElementById('eventsGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <h3>Error cargando eventos</h3>
          <p>Intenta recargar la página</p>
        </div>
      `;
    }
  }

  // Filtrar eventos
  function getFilteredEvents() {
    return allEvents.filter(event => {
      // Categoría
      if (selectedCategory !== 'all' && event.cat !== selectedCategory) return false;

      // Búsqueda
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        if (!event.title.toLowerCase().includes(q) && !event.desc.toLowerCase().includes(q)) {
          return false;
        }
      }

      // Precio
      if (activeFilters.free && event.price !== 0) return false;
      if (activeFilters.paid && event.price === 0) return false;

      // Accesibilidad
      if (activeFilters.accessible && !event.acc) return false;
      if (activeFilters.petfriendly && !event.pet) return false;
      if (activeFilters.kids && !event.kid) return false;

      // Zonas
      if (activeFilters.zones.size > 0 && !activeFilters.zones.has(event.zone)) return false;

      return true;
    });
  }

  // Renderizar eventos
  function renderEvents() {
    const filtered = getFilteredEvents();
    const grid = document.getElementById('eventsGrid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">🔍</div>
          <h3>Sin resultados</h3>
          <p>Intenta cambiar los filtros o la búsqueda</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(event => `
      <div class="event-card" onclick="openEvent(${event.id})">
        <div class="event-image">
          ${event.img ? `<img src="${event.img}" alt="${event.title}" onerror="this.parentElement.innerHTML='<div class=\\'event-image-placeholder\\'>${event.emoji}</div>'">` : `<div class="event-image-placeholder">${event.emoji}</div>`}
          <div class="event-badge ${event.price === 0 ? 'free' : 'paid'}">
            ${event.price === 0 ? 'GRATIS' : event.price ? `$${event.price.toLocaleString('es-CL')}` : 'Consultar'}
          </div>
        </div>
        <div class="event-content">
          <div>
            <div class="event-category">${event.cat}</div>
            <h3 class="event-title">${event.title}</h3>
            <div class="event-meta">
              <div class="event-meta-row">
                <span>📅</span>
                <span>${event.date}</span>
              </div>
              <div class="event-meta-row">
                <span>📍</span>
                <span>${event.venue}</span>
              </div>
            </div>
          </div>
          <div class="event-footer">
            <div class="event-price ${event.price === 0 ? 'free' : ''}">
              ${event.price === 0 ? 'Gratis' : event.price ? `$${event.price.toLocaleString('es-CL')}` : 'Consultar'}
            </div>
            <div class="event-actions">
              <button class="action-btn" onclick="event.stopPropagation(); saveEvent(${event.id})">❤️</button>
              <button class="action-btn" onclick="event.stopPropagation(); shareEvent(${event.id})">↗️</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Manejadores de eventos
  function handleSearch() {
    searchQuery = document.getElementById('searchInput').value;
    renderEvents();
  }

  function selectCategory(cat) {
    selectedCategory = cat;
    document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderEvents();
  }

  function toggleFilterPanel() {
    document.getElementById('filterPanel').classList.toggle('open');
  }

  function toggleFilter(filter) {
    if (['free', 'paid', 'accessible', 'petfriendly', 'kids'].includes(filter)) {
      activeFilters[filter] = !activeFilters[filter];
    } else {
      // Es una zona
      if (activeFilters.zones.has(filter)) {
        activeFilters.zones.delete(filter);
      } else {
        activeFilters.zones.add(filter);
      }
    }
    event.target.classList.toggle('active');
  }

  function resetFilters() {
    activeFilters = {
      free: false,
      paid: false,
      accessible: false,
      petfriendly: false,
      kids: false,
      zones: new Set()
    };
    document.querySelectorAll('.filter-option').forEach(b => b.classList.remove('active'));
  }

  function openEvent(id) {
    const event = allEvents.find(e => e.id === id);
    if (!event) return;
    window.open(event.srcUrl, '_blank');
  }

  function saveEvent(id) {
    showToast('❤️ Guardado (próximamente)');
  }

  function shareEvent(id) {
    const event = allEvents.find(e => e.id === id);
    if (!event) return;

    if (navigator.share) {
      navigator.share({
        title: event.title,
        text: `${event.date} • ${event.venue}`,
        url: window.location.href
      });
    } else {
      navigator.clipboard.writeText(event.srcUrl);
      showToast('🔗 Link copiado');
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // Inicializar
  loadEvents();
</script>

</body>
</html>
